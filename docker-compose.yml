services:
  # --- DATABASE ---
  db:
    image: supabase/postgres:15.14.1.067
    container_name: supabase_db
    env_file: .env
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    # Enable logical replication for Realtime
    command: postgres -c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10 -c listen_addresses='*'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "supabase"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- AUTH ---
  auth:
    image: supabase/gotrue:v2.185.0-rc.12
    container_name: supabase_auth
    env_file: .env
    restart: unless-stopped
    ports:
      - "9999:9999"
    depends_on:
      db:
        condition: service_healthy

  # --- STORAGE ---
  storage:
    image: supabase/storage-api:latest
    container_name: supabase_storage
    env_file: .env
    restart: unless-stopped
    ports:
      - "${STORAGE_PORT}:5000"
    volumes:
      - storage_data:${FILE_STORAGE_BACKEND_PATH}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started

  # --- REALTIME ---
  realtime:
    image: supabase/realtime:latest
    container_name: supabase_realtime
    env_file: .env
    restart: unless-stopped
    ports:
      - "${REALTIME_PORT}:4000"
    depends_on:
      db:
        condition: service_healthy

  # --- KONG (API Gateway for Studio) ---
  kong:
    image: kong:2.8.1
    container_name: supabase_kong
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./kong.yml:/home/kong/kong.yml:ro,z

  # --- POSTGRES META ---
  meta:
    image: supabase/postgres-meta:v0.95.1
    container_name: supabase_meta
    env_file: .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}

  # --- POSTGREST (REST API) ---
  rest:
    image: postgrest/postgrest:v14.1
    container_name: supabase_rest
    env_file: .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}

  # --- STUDIO (Dashboard) ---
  studio:
    image: supabase/studio:2025.12.17-sha-43f4f7f
    container_name: supabase_studio
    env_file: .env
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      kong:
        condition: service_healthy
      auth:
        condition: service_started
      meta:
        condition: service_started
      rest:
        condition: service_started
    environment:
      HOSTNAME: "::"
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: ../dockerfiles/backend.dockerfile
    container_name: backend
    env_file: .env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/usr/src/app 
      - backend_node_modules:/usr/src/app/node_modules
    depends_on:
      - db
      - auth
      - storage
      - realtime

  # --- FRONTEND ---
  frontend:
    build:
      context: .
      dockerfile: ./dockerfiles/frontend.dockerfile
    container_name: frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - .:/usr/src/frontend
      - frontend_node_modules:/usr/src/frontend/node_modules
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      auth:
        condition: service_started

volumes:
  db_data:
  storage_data:
  frontend_node_modules:
  backend_node_modules: