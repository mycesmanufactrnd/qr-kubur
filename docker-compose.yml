services:
  db:
    image: supabase/postgres:15.14.1.067
    container_name: supabase_db
    env_file: .env
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./volumes/db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:Z
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:Z
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  storage:
    image: supabase/storage-api:latest
    container_name: supabase_storage
    env_file: .env
    restart: unless-stopped
    ports:
      - "${STORAGE_PORT}:5000"
    volumes:
      - ./supabase_storage:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      STORAGE_BACKEND: file

  backend:
    build:
      context: ./backend
      dockerfile: ../dockerfiles/backend.dockerfile
    container_name: backend
    env_file: .env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    depends_on:
      - db
      - storage

  frontend:
    build:
      context: .
      dockerfile: ./dockerfiles/frontend.dockerfile
    container_name: frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - .:/usr/src/frontend
      - frontend_node_modules:/usr/src/frontend/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
  backend_node_modules: