_format_version: "2.1"

services:
  - name: studio-service
    url: http://studio:3000
    routes:
      - name: studio-route
        paths:
          - /

  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth

  - name: storage-v1
    _comment: 'Storage: /storage/v1/* -> http://storage:5000/*'
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Project-Ref: qr-kubur"


  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime
